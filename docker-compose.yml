services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yg1-ai-catalog-app
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # When the app runs in Docker, localhost points to the app container itself.
      MONGO_LOG_URI: mongodb://catalog_logger:catalog_logger@host.docker.internal:27018/yg1_ai_catalog_log?authSource=yg1_ai_catalog_log
