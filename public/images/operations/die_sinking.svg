<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece block -->
  <rect x="10" y="35" width="60" height="35" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Cavity cut into workpiece -->
  <path d="M28,35 L28,52 L52,52 L52,35" fill="none" stroke="#ed1c24" stroke-width="2"/>
  <!-- Cavity bottom -->
  <line x1="28" y1="52" x2="52" y2="52" stroke="#ed1c24" stroke-width="2"/>
  <!-- Tool inside cavity -->
  <rect x="34" y="25" width="12" height="24" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Tool shank -->
  <rect x="37" y="8" width="6" height="17" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Plunge arrow -->
  <line x1="8" y1="20" x2="8" y2="50" stroke="#374151" stroke-width="1.5"/>
  <polyline points="5,47 8,50 11,47" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Material removal marks -->
  <line x1="30" y1="38" x2="34" y2="38" stroke="#ed1c24" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="46" y1="38" x2="50" y2="38" stroke="#ed1c24" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="30" y1="45" x2="34" y2="45" stroke="#ed1c24" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="46" y1="45" x2="50" y2="45" stroke="#ed1c24" stroke-width="1" stroke-dasharray="2,1"/>
</svg>