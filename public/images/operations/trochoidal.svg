<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece walls -->
  <rect x="10" y="20" width="60" height="50" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Slot being cut -->
  <line x1="10" y1="38" x2="70" y2="38" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="10" y1="52" x2="70" y2="52" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Trochoidal looping toolpath -->
  <path d="M18,45 Q18,32 25,32 Q32,32 32,45 Q32,55 25,55 Q20,55 22,48" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
  <path d="M28,45 Q28,32 35,32 Q42,32 42,45 Q42,55 35,55 Q30,55 32,48" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
  <path d="M38,45 Q38,32 45,32 Q52,32 52,45 Q52,55 45,55 Q40,55 42,48" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
  <!-- Feed direction arrow -->
  <line x1="15" y1="14" x2="60" y2="14" stroke="#374151" stroke-width="1.5"/>
  <polyline points="57,11 60,14 57,17" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Tool position -->
  <circle cx="52" cy="45" r="3" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="52" cy="45" r="1" fill="#ed1c24"/>
</svg>