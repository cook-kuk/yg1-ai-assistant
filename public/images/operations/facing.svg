<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece -->
  <rect x="10" y="45" width="60" height="25" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Machined surface (top, red) -->
  <line x1="10" y1="45" x2="45" y2="45" stroke="#ed1c24" stroke-width="2"/>
  <!-- Face mill body (wide disc) -->
  <ellipse cx="35" cy="35" rx="18" ry="5" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Shank -->
  <rect x="32" y="10" width="6" height="20" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Cutting edge indicators -->
  <line x1="17" y1="37" x2="17" y2="43" stroke="#ed1c24" stroke-width="1.5"/>
  <line x1="27" y1="39" x2="27" y2="43" stroke="#ed1c24" stroke-width="1.5"/>
  <line x1="43" y1="39" x2="43" y2="43" stroke="#ed1c24" stroke-width="1.5"/>
  <line x1="53" y1="37" x2="53" y2="43" stroke="#ed1c24" stroke-width="1.5"/>
  <!-- Feed direction arrow -->
  <line x1="55" y1="38" x2="68" y2="38" stroke="#374151" stroke-width="1.5"/>
  <polyline points="65,35 68,38 65,41" fill="none" stroke="#374151" stroke-width="1.5"/>
</svg>