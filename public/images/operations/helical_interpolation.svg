<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece with hole -->
  <rect x="15" y="40" width="50" height="30" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <ellipse cx="40" cy="40" rx="14" ry="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Helix path (spiral going down) -->
  <path d="M40,12 Q50,16 46,20 Q38,25 34,22 Q28,19 34,16" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
  <path d="M34,16 Q42,12 48,20 Q52,26 44,28 Q36,30 32,26" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
  <path d="M32,26 Q28,23 36,22 Q44,20 48,28 Q50,34 42,36" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
  <!-- Tool dot at helix position -->
  <circle cx="42" cy="36" r="3" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="42" cy="36" r="1" fill="#ed1c24"/>
  <!-- Downward arrow showing Z descent -->
  <line x1="62" y1="12" x2="62" y2="38" stroke="#374151" stroke-width="1.5"/>
  <polyline points="59,35 62,38 65,35" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Circular arrow at top -->
  <path d="M30,14 Q32,8 40,8 Q48,8 50,14" fill="none" stroke="#374151" stroke-width="1.5"/>
  <polyline points="48,11 50,14 47,15" fill="none" stroke="#374151" stroke-width="1.5"/>
</svg>