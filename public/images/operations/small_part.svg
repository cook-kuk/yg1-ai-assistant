<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Magnifying glass circle -->
  <circle cx="35" cy="40" r="22" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Magnifying glass handle -->
  <line x1="51" y1="56" x2="68" y2="73" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Small detailed part inside magnifier -->
  <!-- Tiny workpiece -->
  <rect x="25" y="35" width="20" height="12" rx="1" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Small features on the part -->
  <rect x="28" y="35" width="4" height="4" fill="none" stroke="#ed1c24" stroke-width="1"/>
  <rect x="34" y="35" width="3" height="3" fill="none" stroke="#ed1c24" stroke-width="1"/>
  <line x1="40" y1="35" x2="40" y2="39" stroke="#ed1c24" stroke-width="1"/>
  <circle cx="43" cy="41" r="1.5" fill="none" stroke="#ed1c24" stroke-width="1"/>
  <!-- Small chamfer -->
  <line x1="25" y1="35" x2="27" y2="33" stroke="#ed1c24" stroke-width="1"/>
  <!-- Dimension lines -->
  <line x1="25" y1="50" x2="45" y2="50" stroke="#374151" stroke-width="0.8"/>
  <line x1="25" y1="48" x2="25" y2="52" stroke="#374151" stroke-width="0.8"/>
  <line x1="45" y1="48" x2="45" y2="52" stroke="#374151" stroke-width="0.8"/>
</svg>