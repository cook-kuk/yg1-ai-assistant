<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece with curved profile -->
  <path d="M15,65 L15,35 Q25,20 40,30 Q55,40 60,25 L60,65 Z" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Curved profile (machined surface) -->
  <path d="M15,35 Q25,20 40,30 Q55,40 60,25" fill="none" stroke="#ed1c24" stroke-width="2.5"/>
  <!-- Tool at position on curve -->
  <rect x="36" y="14" width="8" height="16" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Tool shank -->
  <rect x="38" y="5" width="4" height="9" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Motion arrow along profile -->
  <path d="M20,28 Q30,16 42,26" fill="none" stroke="#ed1c24" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polyline points="39,24 42,26 40,29" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
</svg>