<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece block -->
  <rect x="10" y="42" width="60" height="28" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Plunge hole in workpiece -->
  <rect x="33" y="42" width="14" height="18" fill="none" stroke="#ed1c24" stroke-width="2"/>
  <!-- Hole bottom -->
  <line x1="33" y1="60" x2="47" y2="60" stroke="#ed1c24" stroke-width="2"/>
  <!-- Tool plunging down -->
  <rect x="35" y="22" width="10" height="26" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Tool shank -->
  <rect x="37" y="5" width="6" height="17" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Plunge arrow (straight down) -->
  <line x1="10" y1="12" x2="10" y2="55" stroke="#374151" stroke-width="2"/>
  <polyline points="7,52 10,55 13,52" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Depth chips/marks -->
  <line x1="35" y1="46" x2="33" y2="46" stroke="#ed1c24" stroke-width="1"/>
  <line x1="45" y1="46" x2="47" y2="46" stroke="#ed1c24" stroke-width="1"/>
  <line x1="35" y1="52" x2="33" y2="52" stroke="#ed1c24" stroke-width="1"/>
  <line x1="45" y1="52" x2="47" y2="52" stroke="#ed1c24" stroke-width="1"/>
</svg>