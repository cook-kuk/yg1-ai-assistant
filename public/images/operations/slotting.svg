<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece block -->
  <rect x="10" y="30" width="60" height="35" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Slot cut into top of workpiece -->
  <rect x="30" y="30" width="14" height="20" fill="none" stroke="#ed1c24" stroke-width="2"/>
  <!-- Tool in the slot -->
  <rect x="32" y="12" width="10" height="28" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Tool shank -->
  <rect x="34" y="5" width="6" height="10" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Feed direction arrow -->
  <line x1="15" y1="72" x2="55" y2="72" stroke="#374151" stroke-width="1.5"/>
  <polyline points="52,69 55,72 52,75" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Slot depth indicator -->
  <line x1="50" y1="30" x2="50" y2="50" stroke="#ed1c24" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="48" y1="30" x2="52" y2="30" stroke="#ed1c24" stroke-width="1"/>
  <line x1="48" y1="50" x2="52" y2="50" stroke="#ed1c24" stroke-width="1"/>
</svg>