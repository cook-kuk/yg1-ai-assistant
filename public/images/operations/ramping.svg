<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece block -->
  <rect x="10" y="40" width="60" height="28" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Ramp cut into workpiece surface -->
  <path d="M20,40 L50,55" fill="none" stroke="#ed1c24" stroke-width="2.5"/>
  <!-- Tool at ramp position -->
  <rect x="44" y="35" width="10" height="20" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Tool shank -->
  <rect x="46" y="12" width="6" height="23" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Ramp angle motion arrow (diagonal entry) -->
  <line x1="15" y1="18" x2="42" y2="38" stroke="#ed1c24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polyline points="39,35 42,38 38,39" fill="none" stroke="#ed1c24" stroke-width="1.5"/>
  <!-- Angle arc -->
  <path d="M25,18 Q22,18 20,20" fill="none" stroke="#374151" stroke-width="1"/>
  <!-- Horizontal reference -->
  <line x1="15" y1="18" x2="30" y2="18" stroke="#374151" stroke-width="1" stroke-dasharray="2,2"/>
</svg>