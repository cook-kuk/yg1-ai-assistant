<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" fill="white"/>
  <!-- Workpiece -->
  <rect x="35" y="25" width="35" height="40" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Cut surface on workpiece side -->
  <line x1="35" y1="25" x2="35" y2="65" stroke="#ed1c24" stroke-width="2"/>
  <!-- Endmill body -->
  <rect x="16" y="28" width="12" height="34" rx="1" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Endmill shank -->
  <rect x="19" y="10" width="6" height="18" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- Cutting teeth marks -->
  <line x1="28" y1="32" x2="31" y2="32" stroke="#ed1c24" stroke-width="1.5"/>
  <line x1="28" y1="40" x2="31" y2="40" stroke="#ed1c24" stroke-width="1.5"/>
  <line x1="28" y1="48" x2="31" y2="48" stroke="#ed1c24" stroke-width="1.5"/>
  <line x1="28" y1="56" x2="31" y2="56" stroke="#ed1c24" stroke-width="1.5"/>
  <!-- Feed direction arrow -->
  <line x1="22" y1="72" x2="38" y2="72" stroke="#374151" stroke-width="1.5"/>
  <polyline points="35,69 38,72 35,75" fill="none" stroke="#374151" stroke-width="1.5"/>
</svg>